<style>
    :root {
      --bg: #04070b;
      --bg-accent: #07111b;
      --panel: rgba(8, 14, 20, 0.96);
      --panel-2: #0c1824;
      --panel-3: #102132;
      --line: rgba(73, 108, 132, 0.42);
      --line-strong: rgba(112, 163, 196, 0.58);
      --text: #f4f8fb;
      --muted: #9eb3c7;
      --primary: #1cc94b;
      --primary-2: #1e90ff;
      --accent: #d7df23;
      --accent-2: #27e31a;
      --glow-blue: rgba(30, 144, 255, 0.24);
      --glow-green: rgba(39, 227, 26, 0.22);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      --soft-shadow: 0 12px 28px rgba(0, 0, 0, 0.26);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 78% 6%, rgba(215, 223, 35, 0.16), transparent 16%),
        radial-gradient(circle at 70% 9%, rgba(39, 227, 26, 0.18), transparent 22%),
        radial-gradient(circle at 62% 18%, rgba(30, 144, 255, 0.18), transparent 26%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-accent) 100%);
      color: var(--text);
    }

    body { min-height: 100vh; }

    .app-shell {
      max-width: 1540px;
      margin: 0 auto;
      padding: 26px;
    }

    .topbar {
      background:
        linear-gradient(180deg, rgba(6, 10, 16, 0.92) 0%, rgba(8, 15, 23, 0.96) 100%);
      border: 1px solid rgba(83, 124, 151, 0.34);
      border-radius: 28px;
      box-shadow: 0 28px 60px rgba(0,0,0,0.40);
      padding: 22px 24px;
      display: grid;
      gap: 16px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .topbar::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 82% 0%, rgba(215,223,35,0.20), transparent 14%),
        radial-gradient(circle at 77% 8%, rgba(39,227,26,0.18), transparent 20%),
        radial-gradient(circle at 70% 20%, rgba(30,144,255,0.16), transparent 28%);
      pointer-events: none;
      opacity: 0.95;
    }

    .topbar::after {
      content: '';
      position: absolute;
      inset: auto 0 0 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(30,144,255,0), rgba(30,144,255,0.65), rgba(39,227,26,0.65), rgba(30,144,255,0));
      pointer-events: none;
    }

    .topbar-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .title-wrap { display: flex; flex-direction: column; gap: 8px; }
    .eyebrow { display: none; }

    .app-title {
      font-size: 30px;
      line-height: 1.04;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0;
      color: #ffffff;
    }

    .subtext {
      color: var(--muted);
      font-size: 14px;
    }

    .topbar .subtext {
      color: rgba(228, 239, 248, 0.78);
      max-width: 780px;
    }

    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .segmented {
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      border-radius: 16px;
      border: 1px solid rgba(83,124,151,0.28);
      background: rgba(255,255,255,0.03);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
    }

    .btn,
    .file-input-label {
      border: 1px solid rgba(79, 121, 150, 0.42);
      background: linear-gradient(180deg, rgba(12, 24, 36, 0.96) 0%, rgba(8, 16, 25, 0.98) 100%);
      color: #eaf6ff;
      border-radius: 14px;
      padding: 10px 15px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 8px 20px rgba(0,0,0,0.24);
    }

    .btn:hover,
    .file-input-label:hover {
      transform: translateY(-1px);
      border-color: rgba(121,178,211,0.64);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 22px rgba(0,0,0,0.28), 0 0 0 1px rgba(30,144,255,0.12);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(25,96,185,0.95) 0%, rgba(30,144,255,0.95) 42%, rgba(39,227,26,0.92) 100%);
      border-color: rgba(95, 196, 255, 0.5);
      color: #031017;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 12px 24px rgba(6, 83, 165, 0.30);
    }

    .btn-primary:hover {
      filter: brightness(1.05);
      border-color: rgba(159, 228, 255, 0.72);
    }

    .btn-active {
      background: linear-gradient(180deg, rgba(238, 247, 255, 0.16) 0%, rgba(198, 231, 255, 0.10) 100%);
      border-color: rgba(140, 198, 235, 0.62);
      color: #f4fbff;
      box-shadow: inset 0 0 0 1px rgba(30,144,255,0.18), 0 0 22px rgba(30,144,255,0.12);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.10);
      color: #f4f8fb;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .btn-ghost:hover {
      border-color: rgba(255,255,255,0.16);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      color: #f4fbff;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    #excelFile { display: none; }

    .filters-panel,
    .calendar-card,
    .empty-state {
      background:
        linear-gradient(180deg, rgba(8, 14, 20, 0.97) 0%, rgba(10, 19, 29, 0.98) 100%);
      border: 1px solid rgba(83, 124, 151, 0.34);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .filters-panel::before,
    .calendar-card::before,
    .empty-state::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 1px;
      background: rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .filters-panel::after,
    .calendar-card::after,
    .empty-state::after {
      content: '';
      position: absolute;
      inset: auto 0 0 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(30,144,255,0), rgba(30,144,255,0.35), rgba(39,227,26,0.35), rgba(30,144,255,0));
      pointer-events: none;
    }

    .filters-inner {
      display: none;
      padding: 22px;
      border-top: 0px solid rgba(83, 124, 151, 0.22);
      background: linear-gradient(180deg, rgba(9, 18, 28, 0.96) 0%, rgba(7, 14, 22, 0.98) 100%);
    }

    .filters-panel.open .filters-inner { display: block; }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 18px;
    }

    .filter-card {
      background: linear-gradient(180deg, rgba(12, 24, 36, 0.94) 0%, rgba(9, 18, 27, 0.98) 100%);
      border: 1px solid rgba(73, 108, 132, 0.34);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--soft-shadow);
    }

    .filter-label {
      display: block;
      margin-bottom: 10px;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 800;
      color: #d8e7f3;
    }

    select[multiple] {
      width: 100%;
      min-height: 180px;
      border-radius: 14px;
      border: 1px solid rgba(79,121,150,0.42);
      background: rgba(4, 11, 18, 0.85);
      padding: 10px;
      font: inherit;
      font-size: 14px;
      color: #f4f8fb;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    option { background: #09131d; color: #f4f8fb; }

    .filters-footer {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 0px solid rgba(83,124,151,0.22);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .summary-text {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .calendar-card { margin-top: 0; }

    .calendar-card::after {
      content: '';
      display: block;
      height: 2px;
      background: linear-gradient(90deg, rgba(30,144,255,0.08) 0%, rgba(30,144,255,0.85) 30%, rgba(39,227,26,0.90) 72%, rgba(215,223,35,0.76) 100%);
    }

    .calendar-frame {
      padding: 20px;
      background: linear-gradient(180deg, rgba(8, 14, 20, 0.75) 0%, rgba(7, 13, 20, 0.40) 100%);
    }

    #calendar { min-height: 720px; }

    .empty-state {
      padding: 76px 24px;
      text-align: center;
    }

    .empty-state h2 {
      margin: 0 0 12px;
      font-size: 34px;
      letter-spacing: -0.03em;
      color: #ffffff;
    }

    .empty-state p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 16px;
    }

    .helper-line {
      font-size: 13px;
      color: var(--muted);
      margin-top: 14px;
    }

    .fc {
      --fc-border-color: rgba(73,108,132,0.34);
      --fc-page-bg-color: transparent;
      --fc-neutral-bg-color: rgba(14, 26, 37, 0.94);
      --fc-today-bg-color: rgba(15, 29, 41, 0.04);
      color: #f4f8fb;
    }

    .fc .fc-toolbar { display: none; }

    .fc .fc-scrollgrid,
    .fc .fc-theme-standard td,
    .fc .fc-theme-standard th {
      border-color: rgba(73,108,132,0.34);
    }

    .fc .fc-scrollgrid {
      border-radius: 18px;
      overflow: hidden;
      background: rgba(6, 12, 18, 0.62);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .fc .fc-col-header-cell {
      background: linear-gradient(180deg, rgba(10,22,33,0.98) 0%, rgba(7,17,26,0.98) 100%);
    }

    .fc .fc-list-day-cushion {
      background: linear-gradient(180deg, rgba(10,22,33,0.98) 0%, rgba(7,17,26,0.98) 100%) !important;
    }

    .fc .fc-list-event:hover td {
      background: rgba(14, 28, 40, 0.88);
    }

    .fc .fc-daygrid-day-events { padding: 4px 6px 10px; }

    .fc .fc-col-header-cell-cushion,
    .fc .fc-daygrid-day-number,
    .fc .fc-list-day-text,
    .fc .fc-list-day-side-text {
      color: #eaf6ff;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .fc .fc-daygrid-day-frame {
      min-height: 132px;
      background: linear-gradient(180deg, rgba(7,13,20,0.92) 0%, rgba(6,11,17,0.86) 100%);
    }

    .fc-daygrid-event,
    .fc-list-event {
      background: linear-gradient(180deg, rgba(12, 24, 36, 0.98) 0%, rgba(9, 18, 28, 0.98) 100%) !important;
      border: 1px solid rgba(80, 122, 151, 0.42) !important;
      border-radius: 16px !important;
      padding: 8px 10px !important;
      margin: 8px 0 !important;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24) !important;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease !important;
    }

    .fc-daygrid-event:hover,
    .fc-list-event:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.30) !important;
      border-color: rgba(140, 198, 235, 0.62) !important;
    }

    .fc-event,
    .fc-event * {
      color: #f4f8fb !important;
      white-space: normal !important;
    }

    .event-card-title {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.34;
      margin-bottom: 8px;
      padding-bottom: 7px;
      border-bottom: 1px solid rgba(86, 126, 151, 0.24);
    }

    .event-card-meta {
      font-size: 12px;
      color: #a9bfd1 !important;
      line-height: 1.35;
      margin-top: 8px;
      padding-top: 7px;
      border-top: 0px solid rgba(86, 126, 151, 0.18);
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      border: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 10, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
      backdrop-filter: blur(10px);
    }

    .modal-backdrop.open { display: flex; }

    .modal-card {
      width: min(640px, 100%);
      background: linear-gradient(180deg, rgba(10,18,28,0.99) 0%, rgba(8,14,22,0.99) 100%);
      border-radius: 28px;
      border: 1px solid rgba(83,124,151,0.34);
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.42);
      overflow: hidden;
    }

    .modal-header,
    .modal-body,
    .modal-footer {
      padding: 22px;
    }

    .modal-header {
      border-bottom: 1px solid rgba(83,124,151,0.22);
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
      background:
        radial-gradient(circle at 88% 10%, rgba(215,223,35,0.18), transparent 16%),
        radial-gradient(circle at 82% 16%, rgba(39,227,26,0.14), transparent 22%),
        radial-gradient(circle at 74% 28%, rgba(30,144,255,0.14), transparent 30%),
        linear-gradient(180deg, rgba(10,20,31,0.98) 0%, rgba(8,16,25,0.96) 100%);
    }

    .modal-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.18;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 12px 16px;
      font-size: 14px;
      color: #f4f8fb;
    }

    .detail-grid .label {
      color: #9eb3c7;
      font-weight: 700;
    }

    .modal-footer {
      border-top: 0px solid rgba(83,124,151,0.22);
      display: flex;
      justify-content: flex-end;
      background: rgba(255,255,255,0.02);
    }

    @media (max-width: 960px) {
      .filters-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .app-shell { padding: 14px; }
      .app-title { font-size: 25px; }
      #calendar { min-height: 620px; }

      .topbar,
      .filters-panel,
      .calendar-card,
      .empty-state,
      .modal-card {
        border-radius: 22px;
      }
    }
</style>

<style>
/* Today column overlay so it remains visible above cell background but below events */
.fc .fc-day-today {
  position: relative;
}

.fc .fc-day-today::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(30,144,255,0.06), rgba(39,227,26,0.05));
  pointer-events: none;
  z-index: 1;
}

.fc .fc-daygrid-day-events,
.fc .fc-timegrid-col-events,
.fc .fc-list-table {
  position: relative;
  z-index: 2;
}
</style>


<style>
  .theme-picker {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
  }

  .theme-picker-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.72);
  }

  .theme-select {
    min-height: 40px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.10);
    color: #f5fbff;
    padding: 8px 12px;
    font: inherit;
    font-size: 14px;
    font-weight: 700;
    outline: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .theme-select option {
    color: #111827;
    background: #ffffff;
  }

  /* Classic original theme */
  body[data-theme="classic"] {
    background: #f6f8fb;
    color: #1f2937;
  }

  body[data-theme="classic"] .topbar {
    background: linear-gradient(135deg, #103a6c 0%, #184f92 100%);
    border: 1px solid #0c325f;
    border-radius: 24px;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
    backdrop-filter: none;
  }

  body[data-theme="classic"] .topbar::before {
    background: none;
  }

  body[data-theme="classic"] .topbar::after {
    content: '';
    position: absolute;
    inset: auto 0 0 0;
    height: 1px;
    background: rgba(255,255,255,0.18);
  }

  body[data-theme="classic"] .app-title,
  body[data-theme="classic"] .topbar .subtext,
  body[data-theme="classic"] .status-pill,
  body[data-theme="classic"] .theme-picker-label,
  body[data-theme="classic"] .btn-ghost {
    color: #ffffff;
  }

  body[data-theme="classic"] .theme-picker {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
  }

  body[data-theme="classic"] .theme-select {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    color: #ffffff;
  }

  body[data-theme="classic"] .segmented {
    border-radius: 14px;

body[data-theme="springfield"] .fc .fc-timegrid-event:hover {
  box-shadow: 0 10px 18px rgba(110,93,22,0.14) !important;
}

/* Neutralize FullCalendar's default dark selection highlight in day view */
body[data-theme="classic"] .fc .fc-timegrid-event.fc-event-selected:before,
body[data-theme="springfield"] .fc .fc-timegrid-event.fc-event-selected:before {
  box-shadow: none !important;
}
</style>


<style>
/* Fix day view hover in listDay for Original and Springfield themes */
body[data-theme="classic"] .fc .fc-list-event:hover td {
  background: #ffffff !important;
  color: #1f2937 !important;
}

body[data-theme="classic"] .fc .fc-list-event:hover td *,
body[data-theme="classic"] .fc .fc-list-event:hover .fc-list-event-title,
body[data-theme="classic"] .fc .fc-list-event:hover .fc-list-event-time,
body[data-theme="classic"] .fc .fc-list-event:hover a {
  color: #1f2937 !important;
}

body[data-theme="springfield"] .fc .fc-list-event:hover td {
  background: #fff5cf !important;
  color: #3b2c08 !important;
}

body[data-theme="springfield"] .fc .fc-list-event:hover td *,
body[data-theme="springfield"] .fc .fc-list-event:hover .fc-list-event-title,
body[data-theme="springfield"] .fc .fc-list-event:hover .fc-list-event-time,
body[data-theme="springfield"] .fc .fc-list-event:hover a {
  color: #3b2c08 !important;
}
</style>


<style>
/* Prevent "All day" from wrapping awkwardly in list/day views */
.fc .fc-list-event-time,
.fc .fc-list-table td.fc-list-event-time,
.fc .fc-list-day-cushion,
.fc .fc-list-event-graphic,
.fc .fc-list-event-title {
  white-space: nowrap !important;
}

.fc .fc-list-table td.fc-list-event-time {
  min-width: 72px !important;
  width: 72px !important;
  font-weight: 700;
  vertical-align: middle;
}

.fc .fc-list-table td.fc-list-event-title {
  white-space: normal !important;
}

/* Improve date range label contrast across themes */
#dateRangeLabel {
  font-weight: 800 !important;
  letter-spacing: -0.01em;
}

body[data-theme="brand"] #dateRangeLabel {
  color: #f5fbff !important;
  text-shadow: 0 1px 0 rgba(0,0,0,0.18);
}

body[data-theme="classic"] #dateRangeLabel {
  color: #ffffff !important;
  text-shadow: 0 1px 0 rgba(0,0,0,0.12);
}

body[data-theme="springfield"] #dateRangeLabel {
  color: #ffffff !important;
  text-shadow: 0 1px 0 rgba(13,63,139,0.25);
}

/* Slightly stronger contrast container feel around the date range area */
body[data-theme="brand"] #dateRangeLabel,
body[data-theme="classic"] #dateRangeLabel,
body[data-theme="springfield"] #dateRangeLabel {
  display: inline-block;
}

/* Mobile safeguard so the time column does not collapse too hard */
@media (max-width: 720px) {
  .fc .fc-list-table td.fc-list-event-time {
    min-width: 82px !important;
    width: 82px !important;
  }
}
</style>


<style>
/* Ensure list/day time labels like "All day" remain visible in lighter themes */
body[data-theme="classic"] .fc .fc-list-event-time,
body[data-theme="classic"] .fc .fc-list-table td.fc-list-event-time,
body[data-theme="classic"] .fc .fc-list-event:hover .fc-list-event-time {
  color: #1f2937 !important;
}

body[data-theme="springfield"] .fc .fc-list-event-time,
body[data-theme="springfield"] .fc .fc-list-table td.fc-list-event-time,
body[data-theme="springfield"] .fc .fc-list-event:hover .fc-list-event-time {
  color: #3b2c08 !important;
}

body[data-theme="classic"] .fc .fc-list-event-time a,
body[data-theme="springfield"] .fc .fc-list-event-time a {
  color: inherit !important;
}
</style>

</head>
<body>
  <div class="app-shell">
    <div id="emptyState" class="empty-state">
<h2>Please select your latest DemoForce data file export to begin</h2>
      <p></p>
      <label class="file-input-label btn-primary" for="excelFile">Choose Excel file</label>
      <input id="excelFile" type="file" accept=".xls,.xlsx,.xlsm" />
      <div class="helper-line"></div>
    </div>

    <div id="appContent" style="display:none;">
      <section class="topbar">
        <div class="topbar-row">
          <div class="title-wrap">
<h1 class="app-title">Engagement Activities Calendar</h1>
            <div class="subtext" id="dateRangeLabel">No data loaded</div>
          </div>
          <div class="toolbar-group">
            <span class="status-pill" id="totalActivitiesPill">0 activities</span>
            <div class="theme-picker theme-pill-group" role="group" aria-label="Choose theme">
              <span class="theme-picker-label">Theme</span>
              <button class="theme-pill" id="themeBrandBtn" type="button" data-theme-choice="brand" aria-pressed="true">Brand</button>
              <button class="theme-pill" id="themeClassicBtn" type="button" data-theme-choice="classic" aria-pressed="false">Original</button>
              <button class="theme-pill" id="themeSpringfieldBtn" type="button" data-theme-choice="springfield" aria-pressed="false">Springfield</button>
            </div>
            <label class="file-input-label" for="excelFile">Replace file</label>
            <button class="btn" id="resetDataBtn" type="button">Reset</button>
          </div>
        </div>

        <div class="topbar-row">
          <div class="toolbar-group">
            <button class="btn" id="prevBtn" type="button">Previous</button>
            <button class="btn btn-primary" id="todayBtn" type="button">Today</button>
            <button class="btn" id="nextBtn" type="button">Next</button>
          </div>

          <div class="toolbar-group">
            <div class="segmented" aria-label="View mode switcher">
              <button class="btn view-btn" data-view="day" type="button">Day</button>
              <button class="btn view-btn btn-active" data-view="week" type="button">Week</button>
              <button class="btn view-btn" data-view="month" type="button">Month</button>
            </div>
          </div>

          <div class="toolbar-group">
            <button class="btn" id="toggleFiltersBtn" type="button">Filters</button>
            <span class="status-pill" id="activeFilterCountPill">0 active filters</span>
          </div>
        </div>
      </section>

      <section class="filters-panel" id="filtersPanel">
        <div class="filters-inner" id="filtersInner">
          <div class="filters-grid">
            <div class="filter-card">
              <label class="filter-label" for="salesEngineerFilter">Sales engineer</label>
              <select id="salesEngineerFilter" multiple size="8"></select>
              <div style="margin-top:10px; display:flex; justify-content:flex-end;">
                <button class="btn btn-ghost" id="resetSalesFilterButton" type="button">Show all</button>
              </div>
            </div>

            <div class="filter-card">
              <label class="filter-label" for="activityTypeFilter">Activity type</label>
              <select id="activityTypeFilter" multiple size="8"></select>
              <div style="margin-top:10px; display:flex; justify-content:flex-end;">
                <button class="btn btn-ghost" id="resetActivityFilterButton" type="button">Show all</button>
              </div>
            </div>

            <div class="filter-card">
              <label class="filter-label" for="engagementFilter">Engagement</label>
              <select id="engagementFilter" multiple size="8"></select>
              <div style="margin-top:10px; display:flex; justify-content:flex-end;">
                <button class="btn btn-ghost" id="resetEngagementFilterButton" type="button">Show all</button>
              </div>
            </div>
          </div>

          <div class="filters-footer">
            <div class="summary-text" id="activeFilters">No filters applied.</div>
            <button class="btn" id="clearAllFiltersBtn" type="button">Clear all filters</button>
          </div>
        </div>
      </section>

      <section class="calendar-card">
        <div class="calendar-frame">
          <div id="calendar"></div>
        </div>
      </section>
    </div>
  </div>

  <div class="modal-backdrop" id="detailModalBackdrop" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <div class="modal-header">
        <div>
          <h2 class="modal-title" id="detailTitle">Activity detail</h2>
          <div class="subtext">Selected calendar entry</div>
        </div>
        <button class="btn" id="closeDetailBtn" type="button">Close</button>
      </div>
      <div class="modal-body">
        <div class="detail-grid">
          <div class="label">Activity</div><div id="detailActivity"></div>
          <div class="label">Sales engineer</div><div id="detailEngineer"></div>
          <div class="label">Engagement</div><div id="detailEngagement"></div>
          <div class="label">Activity type</div><div id="detailType"></div>
          <div class="label">Date</div><div id="detailDate"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="closeDetailBtnFooter" type="button">Done</button>
      </div>
    </div>
  </div>

  <script>

    function applyTheme(theme) {
      const safeTheme = ['classic', 'brand', 'springfield'].includes(theme) ? theme : 'brand';
      document.body.setAttribute('data-theme', safeTheme);

      const brandBtn = document.getElementById('themeBrandBtn');
      const classicBtn = document.getElementById('themeClassicBtn');
      const springfieldBtn = document.getElementById('themeSpringfieldBtn');

      if (brandBtn) {
        const isActive = safeTheme === 'brand';
        brandBtn.classList.toggle('active', isActive);
        brandBtn.setAttribute('aria-pressed', String(isActive));
      }

      if (classicBtn) {
        const isActive = safeTheme === 'classic';
        classicBtn.classList.toggle('active', isActive);
        classicBtn.setAttribute('aria-pressed', String(isActive));
      }

      if (springfieldBtn) {
        const isActive = safeTheme === 'springfield';
        springfieldBtn.classList.toggle('active', isActive);
        springfieldBtn.setAttribute('aria-pressed', String(isActive));
      }

      try {
        localStorage.setItem('demoforceCalendarTheme', safeTheme);
      } catch (e) {}
    }

    function initializeTheme() {
      let savedTheme = 'brand';
      try {
        savedTheme = localStorage.getItem('demoforceCalendarTheme') || 'brand';
        if (!['brand', 'classic', 'springfield'].includes(savedTheme)) savedTheme = 'brand';
      } catch (e) {}
      applyTheme(savedTheme);
    }

    const engineerStyleMapping = {
      "Christina Heinen":    { bg: "#1F77B4", text: "#FFFFFF" },
      "Ayume Herold":        { bg: "#FF7F0E", text: "#000000" },
      "Kyle VanDeLaarschot": { bg: "#2CA02C", text: "#FFFFFF" },
      "Dionna DeVille":      { bg: "#D62728", text: "#FFFFFF" },
      "Amanda Dye":          { bg: "#9467BD", text: "#FFFFFF" },
      "Sean Kim":            { bg: "#8C564B", text: "#FFFFFF" },
      "Andreas Kopatz":      { bg: "#E377C2", text: "#000000" },
      "Filipe De Azevedo":   { bg: "#7F7F7F", text: "#FFFFFF" },
      "Omkar Singh":         { bg: "#BCBD22", text: "#000000" },
      "Brian McDonald":      { bg: "#17BECF", text: "#000000" },
      "Alonzo Kirkman":      { bg: "#4E79A7", text: "#FFFFFF" },
      "Fred Yoo":            { bg: "#F28E2B", text: "#000000" },
      "Connor Nelson":       { bg: "#59A14F", text: "#FFFFFF" },
      "Jenn Maurer":         { bg: "#E15759", text: "#FFFFFF" },
      "Ryan Hathaway":       { bg: "#B07AA1", text: "#FFFFFF" },
      "Nader Ramadan":       { bg: "#9C755F", text: "#FFFFFF" },
      "Madhu Ramani":        { bg: "#EDC948", text: "#000000" },
      "Burkhard Dohr":       { bg: "#76B7B2", text: "#000000" },
      "Stacy Baigent":       { bg: "#FF9DA7", text: "#000000" },
      "James Hall":          { bg: "#A0CBE8", text: "#000000" },
      "Patrick Huang":       { bg: "#BAB0AC", text: "#000000" },
      "Rob Stowell":         { bg: "#86BCB6", text: "#000000" },
      "Adam Beatty":         { bg: "#F1CE63", text: "#000000" },
      "Unassigned":          { bg: "#D3D3D3", text: "#000000" }
    };

    const activityTypeColors = {
      "Call": "#4caf50",
      "Meeting": "#2196f3",
      "Email": "#ff9800",
      "Demo": "#ff0000",
      "Onsite": "#9c27b0"
    };

    let calendar = null;
    let allEvents = [];
    let currentViewMode = 'week';
    let filtersOpen = false;

    function formatDateForDisplay(dateStr) {
      if (!dateStr) return 'Unknown';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString(undefined, {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setDataLoadedState(isLoaded) {
      document.getElementById('emptyState').style.display = isLoaded ? 'none' : 'block';
      document.getElementById('appContent').style.display = isLoaded ? 'block' : 'none';
    }

    function getCalendarViewName(mode) {
      if (mode === 'day') return 'listDay';
      if (mode === 'month') return 'dayGridMonth';
      return 'dayGridWeek';
    }

    function getResponsiveDefaultView() {
      return window.innerWidth <= 720 ? 'dayGridDay' : 'dayGridWeek';
    }

    function enforceMobileDayView() {
      if (!calendar) return;
      if (window.innerWidth <= 720) {
        if (calendar.view.type !== 'dayGridDay') {
          calendar.changeView('dayGridDay');
        }
      }
    }

    function getResponsiveDefaultView_backup() {
      return window.innerWidth <= 720 ? 'listWeek' : 'dayGridWeek';
    }

    function applyResponsiveViewOnLoad() {
      if (!calendar) return;
      const currentView = calendar.view ? calendar.view.type : '';
      if (!currentView) {
        calendar.changeView(getResponsiveDefaultView());
        updateViewButtons();
        return;
      }
      if (window.innerWidth <= 720 && (currentView === 'dayGridWeek' || currentView === 'dayGridMonth')) {
        calendar.changeView('listWeek');
      } else if (window.innerWidth > 720 && currentView === 'listWeek') {
        calendar.changeView('dayGridWeek');
      }
      updateViewButtons();
    }

    function updateViewButtons() {
      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.classList.toggle('btn-active', btn.dataset.view === currentViewMode);
      });
    }

    function extractUnique(list, key) {
      return Array.from(
        new Set(
          list.flatMap(ev => (ev.extendedProps[key] || '').split('||').map(x => x.trim()).filter(Boolean))
        )
      ).sort((a, b) => a.localeCompare(b));
    }

    function extractSelected(id) {
      return Array.from(document.getElementById(id).selectedOptions).map(o => o.value);
    }

    function setSelections(id, values = []) {
      const selectedSet = new Set(values);
      Array.from(document.getElementById(id).options).forEach(opt => {
        opt.selected = selectedSet.has(opt.value);
      });
    }

    function populateDropdown(id, items, resetBtn) {
      const sel = document.getElementById(id);
      sel.innerHTML = '';
      items.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        sel.add(o);
      });
      document.getElementById(resetBtn).onclick = () => {
        sel.selectedIndex = -1;
        applyFilters();
      };
    }

    function updateFilterSummary() {
      const groups = [
        ['salesEngineerFilter', 'Sales Engineer'],
        ['activityTypeFilter', 'Activity Type'],
        ['engagementFilter', 'Engagement']
      ];

      const parts = [];
      let count = 0;

      groups.forEach(([id, label]) => {
        const vals = extractSelected(id);
        count += vals.length;
        if (vals.length) {
          parts.push(label + ': ' + vals.join(', '));
        }
      });

      document.getElementById('activeFilters').textContent = parts.length
        ? 'Active filters: ' + parts.join(' | ')
        : 'No filters applied.';

      document.getElementById('activeFilterCountPill').textContent = count + (count === 1 ? ' active filter' : ' active filters');
    }

    function updateDateRangeLabel() {
      if (!calendar) {
        document.getElementById('dateRangeLabel').textContent = 'No data loaded';
        return;
      }

      const view = calendar.view;
      const start = new Date(view.currentStart);
      const end = new Date(view.currentEnd);
      end.setDate(end.getDate() - 1);

      const formatter = new Intl.DateTimeFormat(undefined, {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });

      const label = currentViewMode === 'day'
        ? formatter.format(start)
        : formatter.format(start) + ' to ' + formatter.format(end);

      document.getElementById('dateRangeLabel').textContent = label;
    }

    function updateTotalActivitiesPill(count) {
      document.getElementById('totalActivitiesPill').textContent = count + (count === 1 ? ' activity' : ' activities');
    }

    function openDetailModal(eventObj) {
      const e = eventObj.extendedProps;
      document.getElementById('detailTitle').textContent = eventObj.title || 'Activity detail';
      document.getElementById('detailActivity').textContent = eventObj.title || '';
      document.getElementById('detailEngineer').textContent = e.sales_engineer || 'Unassigned';
      document.getElementById('detailEngagement').textContent = e.engagement || 'Unknown';
      document.getElementById('detailType').textContent = e.activity_type || 'Unknown';
      document.getElementById('detailDate').textContent = formatDateForDisplay(e.activity_date);
      const backdrop = document.getElementById('detailModalBackdrop');
      backdrop.classList.add('open');
      backdrop.setAttribute('aria-hidden', 'false');
    }

    function closeDetailModal() {
      const backdrop = document.getElementById('detailModalBackdrop');
      backdrop.classList.remove('open');
      backdrop.setAttribute('aria-hidden', 'true');
    }

    function renderCalendar(events) {
      if (calendar) {
        calendar.removeAllEvents();
        calendar.addEventSource(events);
        updateTotalActivitiesPill(events.length);
        updateDateRangeLabel();
        return;
      }

      calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        height: 'auto',
        initialView: getCalendarViewName(currentViewMode),
        headerToolbar: false,
        dayMaxEvents: false,
        events,

        eventContent(arg) {
          const e = arg.event.extendedProps;
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, "0");
        const dd = String(today.getDate()).padStart(2, "0");
        const todayStr = `${yyyy}-${mm}-${dd}`;
        const isToday = arg.event.startStr === todayStr;

          const badges = (e.sales_engineer || 'Unassigned')
            .split('||')
            .map(x => x.trim())
            .filter(Boolean)
            .map(name => {
              const style = engineerStyleMapping[name] || engineerStyleMapping['Unassigned'];
              return `<span class="badge" style="background-color:${style.bg}; color:${style.text} !important;">${escapeHtml(name)}</span>`;
            })
            .join('');

          return {
            html: `
              <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
                <div class="event-card-title">${escapeHtml(arg.event.title)}</div>
                
              </div>
              <div class="badge-row">${badges}</div>
              <div class="event-card-meta">${escapeHtml(e.engagement || 'Unknown')} | ${escapeHtml(e.activity_type || 'Unknown')}</div>
            `
          };
        },

        eventDidMount(info) {
          const type = info.event.extendedProps.activity_type;
          const borderColor = activityTypeColors[type] || '#64748b';
          info.el.style.setProperty('border-left', '4px solid ' + borderColor, 'important');
        },

        eventClick(info) {
          openDetailModal(info.event);
        },

        datesSet() {
          updateDateRangeLabel();
        }
      });

      calendar.render();
      enforceMobileDayView();
      updateTotalActivitiesPill(events.length);
      updateDateRangeLabel();
    }

    function applyFilters() {
      const se = extractSelected('salesEngineerFilter');
      const at = extractSelected('activityTypeFilter');
      const eg = extractSelected('engagementFilter');

      const filtered = allEvents.filter(ev => {
        const engs = (ev.extendedProps.sales_engineer || 'Unassigned').split('||').map(x => x.trim());
        const types = (ev.extendedProps.activity_type || '').split('||').map(x => x.trim());
        const eng = ev.extendedProps.engagement || 'Unknown';

        return (!se.length || se.some(s => engs.includes(s))) &&
               (!at.length || at.some(t => types.includes(t))) &&
               (!eg.length || eg.includes(eng));
      });

      renderCalendar(filtered);
      updateFilterSummary();
    }

    function clearAllFilters() {
      ['salesEngineerFilter', 'activityTypeFilter', 'engagementFilter'].forEach(id => {
        document.getElementById(id).selectedIndex = -1;
      });
      applyFilters();
    }

    function toggleFilters(forceState) {
      filtersOpen = typeof forceState === 'boolean' ? forceState : !filtersOpen;
      document.getElementById('filtersPanel').classList.toggle('open', filtersOpen);
      document.getElementById('toggleFiltersBtn').textContent = filtersOpen ? 'Hide filters' : 'Filters';
    }

    function changeView(mode) {
      currentViewMode = mode;
      updateViewButtons();
      if (calendar) {
        calendar.changeView(getCalendarViewName(mode));
        updateDateRangeLabel();
      }
    }

    function resetAllData() {
      allEvents = [];
      if (calendar) {
        calendar.destroy();
        calendar = null;
      }
      ['salesEngineerFilter', 'activityTypeFilter', 'engagementFilter'].forEach(id => {
        document.getElementById(id).innerHTML = '';
      });
      document.getElementById('excelFile').value = '';
      currentViewMode = 'week';
      updateViewButtons();
      toggleFilters(false);
      updateTotalActivitiesPill(0);
      document.getElementById('dateRangeLabel').textContent = 'No data loaded';
      document.getElementById('activeFilters').textContent = 'No filters applied.';
      document.getElementById('activeFilterCountPill').textContent = '0 active filters';
      setDataLoadedState(false);
    }

    function normalizeKey(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[^a-z0-9]/g, '');
    }

    function getField(row, candidates, fallback = '') {
      const keys = Object.keys(row || {});
      const keyMap = new Map(keys.map(key => [normalizeKey(key), key]));

      for (const candidate of candidates) {
        const exactKey = keyMap.get(normalizeKey(candidate));
        if (exactKey && row[exactKey] !== undefined && row[exactKey] !== null && String(row[exactKey]).trim() !== '') {
          return row[exactKey];
        }
      }

      return fallback;
    }

    function parseExcelFile(file) {
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
          const entitiesSheet = wb.Sheets['Entities'];
          const relationshipsSheet = wb.Sheets['Relationships'];

          if (!entitiesSheet || !relationshipsSheet) {
            alert('The workbook must contain both an Entities sheet and a Relationships sheet.');
            return;
          }

          const ents = XLSX.utils.sheet_to_json(entitiesSheet, { defval: '', range: 1 });
          const rels = XLSX.utils.sheet_to_json(relationshipsSheet, { defval: '', range: 1 });
          const engagementMap = {};
          const activityToEngagementMap = {};
          const engagementIds = new Set();
          const activityIds = new Set();

          ents.forEach(row => {
            const rowType = String(getField(row, ['Type'])).trim().toLowerCase();
            const rowId = getField(row, ['ID', 'Id']);
            const rowName = getField(row, ['Name', 'Activity Name', 'Title']);

            if (rowType === 'engagement' && rowId) {
              engagementMap[rowId] = rowName || 'Unknown';
              engagementIds.add(String(rowId).trim());
            }
            if (rowType === 'activity' && rowId) {
              activityIds.add(String(rowId).trim());
            }
          });

          const relationshipIdFields = [
            'ID', 'Id',
            'Related to ID', 'Related To ID', 'RelatedToID', 'Related ID',
            'From ID', 'From Id', 'To ID', 'To Id',
            'Parent ID', 'Parent Id', 'Child ID', 'Child Id',
            'Source ID', 'Source Id', 'Target ID', 'Target Id',
            'Entity ID', 'Entity Id'
          ];

          rels.forEach(row => {
            const rowType = String(getField(row, ['Type'])).trim().toLowerCase();
            if (!(rowType.includes('engagement') && rowType.includes('activity'))) return;

            const candidates = [];
            relationshipIdFields.forEach(field => {
              const value = row[field];
              if (value !== undefined && value !== null && String(value).trim()) {
                candidates.push(String(value).trim());
              }
            });

            const uniqueCandidates = Array.from(new Set(candidates));
            const matchedEngagementId = uniqueCandidates.find(id => engagementIds.has(id));
            const matchedActivityIds = uniqueCandidates.filter(id => activityIds.has(id));

            if (matchedEngagementId && matchedActivityIds.length) {
              matchedActivityIds.forEach(activityId => {
                activityToEngagementMap[activityId] = matchedEngagementId;
              });
            }
          });

          allEvents = ents
            .filter(row => {
              const rowType = String(getField(row, ['Type'])).trim().toLowerCase();
              const activityDate = getField(row, ['Activity Date', 'Date', 'Start Date']);
              return rowType === 'activity' && activityDate;
            })
            .map(row => {
              const rawDate = getField(row, ['Activity Date', 'Date', 'Start Date']);
              let parsedDate = null;

              if (typeof rawDate === 'number') {
                const d = XLSX.SSF.parse_date_code(rawDate);
                if (d) {
                  parsedDate = `${d.y}-${String(d.m).padStart(2, '0')}-${String(d.d).padStart(2, '0')}`;
                }
              } else if (typeof rawDate === 'string' && rawDate.trim()) {
                const tmp = new Date(rawDate);
                if (!Number.isNaN(tmp.getTime())) {
                  parsedDate = `${tmp.getFullYear()}-${String(tmp.getMonth() + 1).padStart(2, '0')}-${String(tmp.getDate()).padStart(2, '0')}`;
                }
              }

              if (!parsedDate) return null;

              const rowId = getField(row, ['ID', 'Id']);
              const engagementName = engagementMap[activityToEngagementMap[String(rowId).trim()]] || 'Unknown';
              const salesEngineer = getField(row, ['Sales Engineer', 'SalesEngineer', 'Owner', 'Assigned To'], 'Unassigned');
              const activityType = getField(row, ['Activity Type', 'ActivityType', 'Type of Activity', 'Activity'], 'Unknown');
              const title = getField(row, ['Name', 'Activity Name', 'Title'], 'Untitled activity');

              return {
                title,
                start: parsedDate,
                extendedProps: {
                  sales_engineer: salesEngineer,
                  activity_type: activityType,
                  engagement: engagementName,
                  activity_date: parsedDate
                }
              };
            })
            .filter(Boolean);

          populateDropdown('salesEngineerFilter', extractUnique(allEvents, 'sales_engineer'), 'resetSalesFilterButton');
          populateDropdown('activityTypeFilter', extractUnique(allEvents, 'activity_type'), 'resetActivityFilterButton');
          populateDropdown('engagementFilter', extractUnique(allEvents, 'engagement'), 'resetEngagementFilterButton');

          setSelections('salesEngineerFilter');
          setSelections('activityTypeFilter');
          setSelections('engagementFilter');

          setDataLoadedState(true);
          changeView('week');
          applyFilters();
        } catch (err) {
          console.error(err);
          alert('There was a problem reading this Excel file.');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    document.getElementById('excelFile').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      parseExcelFile(file);
    });

    document.getElementById('prevBtn').addEventListener('click', () => calendar && calendar.prev());
    document.getElementById('nextBtn').addEventListener('click', () => calendar && calendar.next());
    document.getElementById('todayBtn').addEventListener('click', () => calendar && calendar.today());
    document.getElementById('toggleFiltersBtn').addEventListener('click', () => toggleFilters());
    document.getElementById('clearAllFiltersBtn').addEventListener('click', clearAllFilters);
    document.getElementById('resetDataBtn').addEventListener('click', resetAllData);

    initializeTheme();

    const brandThemeBtn = document.getElementById('themeBrandBtn');
    const classicThemeBtn = document.getElementById('themeClassicBtn');
    const springfieldThemeBtn = document.getElementById('themeSpringfieldBtn');

    if (brandThemeBtn) {
      brandThemeBtn.addEventListener('click', () => applyTheme('brand'));
    }

    if (classicThemeBtn) {
      classicThemeBtn.addEventListener('click', () => applyTheme('classic'));
    }

    if (springfieldThemeBtn) {
      springfieldThemeBtn.addEventListener('click', () => applyTheme('springfield'));
    }

    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => changeView(btn.dataset.view));
    });

    ['salesEngineerFilter', 'activityTypeFilter', 'engagementFilter'].forEach(id => {
      document.getElementById(id).addEventListener('change', applyFilters);
    });

    document.getElementById('closeDetailBtn').addEventListener('click', closeDetailModal);
    document.getElementById('closeDetailBtnFooter').addEventListener('click', closeDetailModal);
    document.getElementById('detailModalBackdrop').addEventListener('click', e => {
      if (e.target.id === 'detailModalBackdrop') {
        closeDetailModal();
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeDetailModal();
      }
    });

    window.addEventListener('resize', () => {
      enforceMobileDayView();
      if (calendar) {
        applyResponsiveViewOnLoad();
      }
    });

    updateViewButtons();
    updateFilterSummary();
  </script>
</body>
</html>
