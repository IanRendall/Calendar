<style>
    :root {
      --bg: #04070b;
      --bg-accent: #07111b;
      --panel: rgba(8, 14, 20, 0.96);
      --panel-2: #0c1824;
      --panel-3: #102132;
      --line: rgba(73, 108, 132, 0.42);
      --line-strong: rgba(112, 163, 196, 0.58);
      --text: #f4f8fb;
      --muted: #9eb3c7;
      --primary: #1cc94b;
      --primary-2: #1e90ff;
      --accent: #d7df23;
      --accent-2: #27e31a;
      --glow-blue: rgba(30, 144, 255, 0.24);
      --glow-green: rgba(39, 227, 26, 0.22);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      --soft-shadow: 0 12px 28px rgba(0, 0, 0, 0.26);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 78% 6%, rgba(215, 223, 35, 0.16), transparent 16%),
        radial-gradient(circle at 70% 9%, rgba(39, 227, 26, 0.18), transparent 22%),
        radial-gradient(circle at 62% 18%, rgba(30, 144, 255, 0.18), transparent 26%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-accent) 100%);
      color: var(--text);
    }

    body { min-height: 100vh; transition: background 0.25s ease, color 0.2s ease; }

    .app-shell {
      width: 100%;
      max-width: 1800px;
      margin: 0 auto;
      padding: 20px clamp(16px, 2.5vw, 32px);
    }

    .topbar {
      background:
        linear-gradient(180deg, rgba(6, 10, 16, 0.92) 0%, rgba(8, 15, 23, 0.96) 100%);
      border: 1px solid rgba(83, 124, 151, 0.34);
      border-radius: 28px;
      box-shadow: 0 28px 60px rgba(0,0,0,0.40);
      padding: 22px 24px;
      display: grid;
      gap: 16px;
      margin: 0 auto 20px;
      max-width: 1400px;
      width: 100%;
      position: relative;
      overflow: visible;
      backdrop-filter: blur(12px);
      z-index: 20;
    }

    .topbar::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 82% 0%, rgba(215,223,35,0.20), transparent 14%),
        radial-gradient(circle at 77% 8%, rgba(39,227,26,0.18), transparent 20%),
        radial-gradient(circle at 70% 20%, rgba(30,144,255,0.16), transparent 28%);
      pointer-events: none;
      opacity: 0.95;
    }

    .topbar::after {
      content: '';
      position: absolute;
      inset: auto 0 0 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(30,144,255,0), rgba(30,144,255,0.65), rgba(39,227,26,0.65), rgba(30,144,255,0));
      pointer-events: none;
    }

    .topbar-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .title-wrap { display: flex; flex-direction: column; gap: 8px; }
    .eyebrow { display: none; }

    .app-title {
      font-size: 30px;
      line-height: 1.04;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0;
      color: #ffffff;
    }

    .subtext {
      color: var(--muted);
      font-size: 14px;
    }

    .topbar .subtext {
      color: rgba(228, 239, 248, 0.78);
      max-width: 780px;
    }

    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .segmented {
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      border-radius: 16px;
      border: 1px solid rgba(83,124,151,0.28);
      background: rgba(255,255,255,0.03);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
    }

    .btn,
    .file-input-label {
      border: 1px solid rgba(79, 121, 150, 0.42);
      background: linear-gradient(180deg, rgba(12, 24, 36, 0.96) 0%, rgba(8, 16, 25, 0.98) 100%);
      color: #eaf6ff;
      border-radius: 14px;
      padding: 10px 15px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 8px 20px rgba(0,0,0,0.24);
    }

    .btn:hover,
    .file-input-label:hover {
      transform: translateY(-1px);
      border-color: rgba(121,178,211,0.64);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 22px rgba(0,0,0,0.28), 0 0 0 1px rgba(30,144,255,0.12);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(25,96,185,0.95) 0%, rgba(30,144,255,0.95) 42%, rgba(39,227,26,0.92) 100%);
      border-color: rgba(95, 196, 255, 0.5);
      color: #031017;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 12px 24px rgba(6, 83, 165, 0.30);
    }

    .btn-primary:hover {
      filter: brightness(1.05);
      border-color: rgba(159, 228, 255, 0.72);
    }

    .btn-active {
      background: linear-gradient(180deg, rgba(238, 247, 255, 0.16) 0%, rgba(198, 231, 255, 0.10) 100%);
      border-color: rgba(140, 198, 235, 0.62);
      color: #f4fbff;
      box-shadow: inset 0 0 0 1px rgba(30,144,255,0.18), 0 0 22px rgba(30,144,255,0.12);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.10);
      color: #f4f8fb;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .btn-ghost:hover {
      border-color: rgba(255,255,255,0.16);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      color: #f4fbff;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    #excelFile { display: none; }

    .filters-panel,
    .calendar-card,
    .empty-state {
      background:
        linear-gradient(180deg, rgba(8, 14, 20, 0.97) 0%, rgba(10, 19, 29, 0.98) 100%);
      border: 1px solid rgba(83, 124, 151, 0.34);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: visible;
      z-index: 10;
      position: relative;
    }

    .filters-panel::before,
    .calendar-card::before,
    .empty-state::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 1px;
      background: rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .filters-panel::after,
    .calendar-card::after,
    .empty-state::after {
      content: '';
      position: absolute;
      inset: auto 0 0 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(30,144,255,0), rgba(30,144,255,0.35), rgba(39,227,26,0.35), rgba(30,144,255,0));
      pointer-events: none;
    }

    .filters-inner {
      display: none;
      padding: 22px;
      border-top: 0px solid rgba(83, 124, 151, 0.22);
      background: linear-gradient(180deg, rgba(9, 18, 28, 0.96) 0%, rgba(7, 14, 22, 0.98) 100%);
    }

    .filters-panel.open .filters-inner { display: block; }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 18px;
    }

    .filter-card {
      background: linear-gradient(180deg, rgba(12, 24, 36, 0.94) 0%, rgba(9, 18, 27, 0.98) 100%);
      border: 1px solid rgba(73, 108, 132, 0.34);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--soft-shadow);
    }

    .filter-label {
      display: block;
      margin-bottom: 10px;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 800;
      color: #d8e7f3;
    }

    select[multiple] {
      width: 100%;
      min-height: 180px;
      border-radius: 14px;
      border: 1px solid rgba(79,121,150,0.42);
      background: rgba(4, 11, 18, 0.85);
      padding: 10px;
      font: inherit;
      font-size: 14px;
      color: #f4f8fb;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    option { background: #09131d; color: #f4f8fb; }

    .filters-footer {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 0px solid rgba(83,124,151,0.22);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .summary-text {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .calendar-card { margin-top: 0; }

    .calendar-card::after {
      content: '';
      display: block;
      height: 2px;
      background: linear-gradient(90deg, rgba(30,144,255,0.08) 0%, rgba(30,144,255,0.85) 30%, rgba(39,227,26,0.90) 72%, rgba(215,223,35,0.76) 100%);
    }

    .calendar-frame {
      padding: clamp(12px, 1.5vw, 24px);
      background: linear-gradient(180deg, rgba(8, 14, 20, 0.75) 0%, rgba(7, 13, 20, 0.40) 100%);
    }

    #calendar { min-height: 720px; }

    .empty-state {
      padding: 76px 24px;
      text-align: center;
    }

    .empty-state h2 {
      margin: 0 0 12px;
      font-size: 34px;
      letter-spacing: -0.03em;
      color: #ffffff;
    }

    .empty-state p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 16px;
    }

    .helper-line {
      font-size: 13px;
      color: var(--muted);
      margin-top: 14px;
    }

    .fc {
      --fc-border-color: rgba(73,108,132,0.34);
      --fc-page-bg-color: transparent;
      --fc-neutral-bg-color: rgba(14, 26, 37, 0.94);
      --fc-today-bg-color: rgba(15, 29, 41, 0.04);
      color: #f4f8fb;
    }

    .fc .fc-toolbar { display: none; }

    .fc .fc-scrollgrid,
    .fc .fc-theme-standard td,
    .fc .fc-theme-standard th {
      border-color: rgba(73,108,132,0.34);
    }

    .fc .fc-scrollgrid {
      border-radius: 18px;
      overflow: visible;
      z-index: 10;
      background: rgba(6, 12, 18, 0.62);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .fc .fc-col-header-cell {
      background: linear-gradient(180deg, rgba(10,22,33,0.98) 0%, rgba(7,17,26,0.98) 100%);
    }

    .fc .fc-list-day-cushion {
      background: linear-gradient(180deg, rgba(10,22,33,0.98) 0%, rgba(7,17,26,0.98) 100%) !important;
    }

    .fc .fc-list-event:hover td {
      background: rgba(14, 28, 40, 0.88);
    }

    .fc .fc-daygrid-day-events { padding: 4px 6px 10px; }

    .fc .fc-col-header-cell-cushion,
    .fc .fc-daygrid-day-number,
    .fc .fc-list-day-text,
    .fc .fc-list-day-side-text {
      color: #eaf6ff;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .fc .fc-daygrid-day-frame {
      min-height: 132px;
      background: linear-gradient(180deg, rgba(7,13,20,0.92) 0%, rgba(6,11,17,0.86) 100%);
    }

    .fc-daygrid-event,
    .fc-list-event {
      background: linear-gradient(180deg, rgba(12, 24, 36, 0.98) 0%, rgba(9, 18, 28, 0.98) 100%) !important;
      border: 1px solid rgba(80, 122, 151, 0.42) !important;
      border-radius: 16px !important;
      padding: 8px 10px !important;
      margin: 8px 0 !important;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24) !important;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease !important;
    }

    .fc-daygrid-event:hover,
    .fc-list-event:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.30) !important;
      border-color: rgba(140, 198, 235, 0.62) !important;
    }

    .fc-event,
    .fc-event * {
      color: #f4f8fb !important;
      white-space: normal !important;
    }

    .event-card-title {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.34;
      margin-bottom: 8px;
      padding-bottom: 7px;
      border-bottom: 1px solid rgba(86, 126, 151, 0.24);
    }

    .event-card-meta {
      font-size: 12px;
      color: #a9bfd1 !important;
      line-height: 1.35;
      margin-top: 8px;
      padding-top: 7px;
      border-top: 0px solid rgba(86, 126, 151, 0.18);
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      border: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 10, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
      backdrop-filter: blur(10px);
    }

    .modal-backdrop.open { display: flex; }

    .modal-card {
      width: min(640px, 100%);
      background: linear-gradient(180deg, rgba(10,18,28,0.99) 0%, rgba(8,14,22,0.99) 100%);
      border-radius: 28px;
      border: 1px solid rgba(83,124,151,0.34);
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.42);
      overflow: visible;
      z-index: 10;
    }

    .modal-header,
    .modal-body,
    .modal-footer {
      padding: 22px;
    }

    .modal-header {
      border-bottom: 1px solid rgba(83,124,151,0.22);
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
      background:
        radial-gradient(circle at 88% 10%, rgba(215,223,35,0.18), transparent 16%),
        radial-gradient(circle at 82% 16%, rgba(39,227,26,0.14), transparent 22%),
        radial-gradient(circle at 74% 28%, rgba(30,144,255,0.14), transparent 30%),
        linear-gradient(180deg, rgba(10,20,31,0.98) 0%, rgba(8,16,25,0.96) 100%);
    }

    .modal-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.18;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 12px 16px;
      font-size: 14px;
      color: #f4f8fb;
    }

    .detail-grid .label {
      color: #9eb3c7;
      font-weight: 700;
    }

    .modal-footer {
      border-top: 0px solid rgba(83,124,151,0.22);
      display: flex;
      justify-content: flex-end;
      background: rgba(255,255,255,0.02);
    }

    @media (max-width: 960px) {
      .filters-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .app-shell { padding: 14px; }
      .app-title { font-size: 25px; }
      #calendar { min-height: 620px; }

      .topbar,
      .filters-panel,
      .calendar-card,
      .empty-state,
      .modal-card {
        border-radius: 22px;
      }
    }
</style>

<style>
/* Today column overlay so it remains visible above cell background but below events */
.fc .fc-day-today {
  position: relative;
}

.fc .fc-day-today::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(30,144,255,0.06), rgba(39,227,26,0.05));
  pointer-events: none;
  z-index: 1;
}

.fc .fc-daygrid-day-events,
.fc .fc-timegrid-col-events,
.fc .fc-list-table {
  position: relative;
  z-index: 2;
}
</style>


<style>
  .theme-picker {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
  }

  .theme-picker-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.72);
  }

  .theme-select {
    min-height: 40px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.10);
    color: #f5fbff;
    padding: 8px 12px;
    font: inherit;
    font-size: 14px;
    font-weight: 700;
    outline: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .theme-select option {
    color: #111827;
    background: #ffffff;
  }

  /* Distinct Brand theme */
  body[data-theme="brand"] {
    background:
      radial-gradient(circle at 82% 8%, rgba(0, 180, 255, 0.18), transparent 18%),
      radial-gradient(circle at 70% 18%, rgba(0, 255, 170, 0.16), transparent 24%),
      linear-gradient(180deg, #02050a 0%, #050d18 100%);
    color: #eaf6ff;
  }

  body[data-theme="brand"] .topbar {
    background: linear-gradient(180deg, rgba(6, 14, 22, 0.96) 0%, rgba(8, 18, 28, 0.98) 100%);
    border: 1px solid rgba(0, 200, 255, 0.25);
    box-shadow: 0 20px 50px rgba(0, 120, 255, 0.18);
  }

  body[data-theme="brand"] .calendar-card,
  body[data-theme="brand"] .filters-panel,
  body[data-theme="brand"] .empty-state {
    border-color: rgba(0, 200, 255, 0.22);
  }

  body[data-theme="brand"] .btn-primary {
    background: linear-gradient(135deg, #00c6ff 0%, #00ffa6 100%);
    color: #041018;
    border-color: rgba(0, 255, 200, 0.5);
  }

  body[data-theme="brand"] .btn-primary:hover {
    filter: brightness(1.08);
  }

  body[data-theme="brand"] .status-pill {

  <script>

    function applyThemeRuntimeOverrides(theme) {
      const themeTrigger = document.getElementById('themeMenuButton');
      if (!themeTrigger) return;
      themeTrigger.style.color = '';
      themeTrigger.style.background = '';
      themeTrigger.style.borderColor = '';

      if (theme === 'brand') {
        themeTrigger.style.color = '#eefcff';
        themeTrigger.style.background = 'rgba(0,229,255,0.08)';
        themeTrigger.style.borderColor = 'rgba(0,229,255,0.28)';
      } else if (theme === 'classic') {
        themeTrigger.style.color = '#ffffff';
      } else if (theme === 'springfield') {
        themeTrigger.style.color = '#ffffff';
      } else if (theme === 'noir') {
        themeTrigger.style.color = '#ececec';
        themeTrigger.style.background = 'rgba(255,255,255,0.03)';
        themeTrigger.style.borderColor = 'rgba(255,255,255,0.14)';
      } else if (theme === 'glass') {
        themeTrigger.style.color = '#f8fbff';
        themeTrigger.style.background = 'rgba(255,255,255,0.14)';
        themeTrigger.style.borderColor = 'rgba(255,255,255,0.24)';
      }
    }

    function applyTheme(theme) {
      const safeTheme = ['brand', 'classic', 'springfield', 'noir', 'glass'].includes(theme) ? theme : 'brand';
      const themeClasses = ['theme-brand', 'theme-classic', 'theme-springfield', 'theme-noir', 'theme-glass'];
      document.body.setAttribute('data-theme', safeTheme);
      document.documentElement.setAttribute('data-theme', safeTheme);
      document.body.classList.remove(...themeClasses);
      document.documentElement.classList.remove(...themeClasses);
      document.body.classList.add('theme-' + safeTheme);
      document.documentElement.classList.add('theme-' + safeTheme);

      const themeButtons = [
        { id: 'themeBrandBtn', theme: 'brand' },
        { id: 'themeClassicBtn', theme: 'classic' },
        { id: 'themeSpringfieldBtn', theme: 'springfield' },
        { id: 'themeNoirBtn', theme: 'noir' },
        { id: 'themeGlassBtn', theme: 'glass' }
      ];

      themeButtons.forEach(({ id, theme }) => {
        const el = document.getElementById(id);
        if (!el) return;
        const isActive = safeTheme === theme;
        el.classList.toggle('active', isActive);
        el.setAttribute('aria-checked', String(isActive));
      });

      const themeMenuButton = document.getElementById('themeMenuButton');
      if (themeMenuButton) {
        const labelMap = {
          brand: 'Brand',
          classic: 'Original',
          springfield: 'Springfield',
          noir: 'Film Noir',
          glass: 'Glass'
        };
        themeMenuButton.textContent = labelMap[safeTheme] || 'Theme';
      }

      applyThemeRuntimeOverrides(safeTheme);

      try {
        localStorage.setItem('demoforceCalendarTheme', safeTheme);
      } catch (e) {}
    }

    function initializeTheme() {
      let savedTheme = 'brand';
      try {
        savedTheme = localStorage.getItem('demoforceCalendarTheme') || 'brand';
        if (!['brand', 'classic', 'springfield', 'noir', 'glass'].includes(savedTheme)) savedTheme = 'brand';
      } catch (e) {}
      applyTheme(savedTheme);
    }

      "Call": "#4caf50",
      "Meeting": "#2196f3",
      "Email": "#ff9800",
      "Demo": "#ff0000",
      "Onsite": "#9c27b0"
    };

    let calendar = null;
    let allEvents = [];
    let currentViewMode = 'week';
    let filtersOpen = false;

    function formatDateForDisplay(dateStr) {
      if (!dateStr) return 'Unknown';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString(undefined, {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setDataLoadedState(isLoaded) {
      document.getElementById('emptyState').style.display = isLoaded ? 'none' : 'block';
      document.getElementById('appContent').style.display = isLoaded ? 'block' : 'none';
    }

    function getCalendarViewName(mode) {
      if (mode === 'day') return 'listDay';
      if (mode === 'month') return 'dayGridMonth';
      return 'dayGridWeek';
    }

    function getResponsiveDefaultView() {
      return window.innerWidth <= 720 ? 'dayGridDay' : 'dayGridWeek';
    }

    function enforceMobileDayView() {
      if (!calendar) return;
      if (window.innerWidth <= 720) {
        if (calendar.view.type !== 'dayGridDay') {
          calendar.changeView('dayGridDay');
        }
      }
    }

    function getResponsiveDefaultView_backup() {
      return window.innerWidth <= 720 ? 'listWeek' : 'dayGridWeek';
    }

    function applyResponsiveViewOnLoad() {
      if (!calendar) return;
      const currentView = calendar.view ? calendar.view.type : '';
      if (!currentView) {
        calendar.changeView(getResponsiveDefaultView());
        updateViewButtons();
        return;
      }
      if (window.innerWidth <= 720 && (currentView === 'dayGridWeek' || currentView === 'dayGridMonth')) {
        calendar.changeView('listWeek');
      } else if (window.innerWidth > 720 && currentView === 'listWeek') {
        calendar.changeView('dayGridWeek');
      }
      updateViewButtons();
    }

    function updateViewButtons() {
      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.classList.toggle('btn-active', btn.dataset.view === currentViewMode);
      });
    }

    function extractUnique(list, key) {
      return Array.from(
        new Set(
          list.flatMap(ev => (ev.extendedProps[key] || '').split('||').map(x => x.trim()).filter(Boolean))
        )
      ).sort((a, b) => a.localeCompare(b));
    }

    function extractSelected(id) {
      return Array.from(document.getElementById(id).selectedOptions).map(o => o.value);
    }

    function setSelections(id, values = []) {
      const selectedSet = new Set(values);
      Array.from(document.getElementById(id).options).forEach(opt => {
        opt.selected = selectedSet.has(opt.value);
      });
    }

    function populateDropdown(id, items, resetBtn) {
      const sel = document.getElementById(id);
      sel.innerHTML = '';
      items.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        sel.add(o);
      });
      document.getElementById(resetBtn).onclick = () => {
        sel.selectedIndex = -1;
        applyFilters();
      };
    }

    function updateFilterSummary() {
      const groups = [
        ['salesEngineerFilter', 'Sales Engineer'],
        ['activityTypeFilter', 'Activity Type'],
        ['engagementFilter', 'Engagement']
      ];

      const parts = [];
      let count = 0;

      groups.forEach(([id, label]) => {
        const vals = extractSelected(id);
        count += vals.length;
        if (vals.length) {
          parts.push(label + ': ' + vals.join(', '));
        }
      });

      document.getElementById('activeFilters').textContent = parts.length
        ? 'Active filters: ' + parts.join(' | ')
        : 'No filters applied.';

      document.getElementById('activeFilterCountPill').textContent = count + (count === 1 ? ' active filter' : ' active filters');
    }

    function updateDateRangeLabel() {
      if (!calendar) {
        document.getElementById('dateRangeLabel').textContent = 'No data loaded';
        return;
      }

      const view = calendar.view;
      const start = new Date(view.currentStart);
      const end = new Date(view.currentEnd);
      end.setDate(end.getDate() - 1);

      const formatter = new Intl.DateTimeFormat(undefined, {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });

      const label = currentViewMode === 'day'
        ? formatter.format(start)
        : formatter.format(start) + ' to ' + formatter.format(end);

      document.getElementById('dateRangeLabel').textContent = label;
    }

    function updateTotalActivitiesPill(count) {
      document.getElementById('totalActivitiesPill').textContent = count + (count === 1 ? ' activity' : ' activities');
    }

    function openDetailModal(eventObj) {
      const e = eventObj.extendedProps;
      document.getElementById('detailTitle').textContent = eventObj.title || 'Activity detail';
      document.getElementById('detailActivity').textContent = eventObj.title || '';
      document.getElementById('detailEngineer').textContent = e.sales_engineer || 'Unassigned';
      document.getElementById('detailEngagement').textContent = e.engagement || 'Unknown';
      document.getElementById('detailType').textContent = e.activity_type || 'Unknown';
      document.getElementById('detailDate').textContent = formatDateForDisplay(e.activity_date);
      const backdrop = document.getElementById('detailModalBackdrop');
      backdrop.classList.add('open');
      backdrop.setAttribute('aria-hidden', 'false');
    }

    function closeDetailModal() {
      const backdrop = document.getElementById('detailModalBackdrop');
      backdrop.classList.remove('open');
      backdrop.setAttribute('aria-hidden', 'true');
    }

    function renderCalendar(events) {
      if (calendar) {
        calendar.removeAllEvents();
        calendar.addEventSource(events);
        updateTotalActivitiesPill(events.length);
        updateDateRangeLabel();
        return;
      }

      calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        height: 'auto',
        initialView: getCalendarViewName(currentViewMode),
        headerToolbar: false,
        dayMaxEvents: false,
        events,

        eventContent(arg) {
          const e = arg.event.extendedProps;
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, "0");
        const dd = String(today.getDate()).padStart(2, "0");
        const todayStr = `${yyyy}-${mm}-${dd}`;
        const isToday = arg.event.startStr === todayStr;

          const badges = (e.sales_engineer || 'Unassigned')
            .split('||')
            .map(x => x.trim())
            .filter(Boolean)
            .map(name => {
              const style = engineerStyleMapping[name] || engineerStyleMapping['Unassigned'];
              return `<span class="badge" style="background-color:${style.bg}; color:${style.text} !important;">${escapeHtml(name)}</span>`;
            })
            .join('');

          return {
            html: `
              <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
                <div class="event-card-title">${escapeHtml(arg.event.title)}</div>
                
              </div>
              <div class="badge-row">${badges}</div>
              <div class="event-card-meta">${escapeHtml(e.engagement || 'Unknown')} | ${escapeHtml(e.activity_type || 'Unknown')}</div>
            `
          };
        },

        eventDidMount(info) {
          const type = info.event.extendedProps.activity_type;
          const borderColor = activityTypeColors[type] || '#64748b';
          info.el.style.setProperty('border-left', '4px solid ' + borderColor, 'important');
        },

        eventClick(info) {
          openDetailModal(info.event);
        },

        datesSet() {
          updateDateRangeLabel();
        }
      });

      calendar.render();
      enforceMobileDayView();
      updateTotalActivitiesPill(events.length);
      updateDateRangeLabel();
    }

    function applyFilters() {
      const se = extractSelected('salesEngineerFilter');
      const at = extractSelected('activityTypeFilter');
      const eg = extractSelected('engagementFilter');

      const filtered = allEvents.filter(ev => {
        const engs = (ev.extendedProps.sales_engineer || 'Unassigned').split('||').map(x => x.trim());
        const types = (ev.extendedProps.activity_type || '').split('||').map(x => x.trim());
        const eng = ev.extendedProps.engagement || 'Unknown';

        return (!se.length || se.some(s => engs.includes(s))) &&
               (!at.length || at.some(t => types.includes(t))) &&
               (!eg.length || eg.includes(eng));
      });

      renderCalendar(filtered);
      updateFilterSummary();
    }

    function clearAllFilters() {
      ['salesEngineerFilter', 'activityTypeFilter', 'engagementFilter'].forEach(id => {
        document.getElementById(id).selectedIndex = -1;
      });
      applyFilters();
    }

    function toggleFilters(forceState) {
      filtersOpen = typeof forceState === 'boolean' ? forceState : !filtersOpen;
      document.getElementById('filtersPanel').classList.toggle('open', filtersOpen);
      document.getElementById('toggleFiltersBtn').textContent = filtersOpen ? 'Hide filters' : 'Filters';
    }

    function changeView(mode) {
      currentViewMode = mode;
      updateViewButtons();
      if (calendar) {
        calendar.changeView(getCalendarViewName(mode));
        updateDateRangeLabel();
      }
    }

    function resetAllData() {
      allEvents = [];
      if (calendar) {
        calendar.destroy();
        calendar = null;
      }
      ['salesEngineerFilter', 'activityTypeFilter', 'engagementFilter'].forEach(id => {
        document.getElementById(id).innerHTML = '';
      });
      document.getElementById('excelFile').value = '';
      currentViewMode = 'week';
      updateViewButtons();
      toggleFilters(false);
      updateTotalActivitiesPill(0);
      document.getElementById('dateRangeLabel').textContent = 'No data loaded';
      document.getElementById('activeFilters').textContent = 'No filters applied.';
      document.getElementById('activeFilterCountPill').textContent = '0 active filters';
      setDataLoadedState(false);
    }

    function normalizeKey(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[^a-z0-9]/g, '');
    }

    function getField(row, candidates, fallback = '') {
      const keys = Object.keys(row || {});
      const keyMap = new Map(keys.map(key => [normalizeKey(key), key]));

      for (const candidate of candidates) {
        const exactKey = keyMap.get(normalizeKey(candidate));
        if (exactKey && row[exactKey] !== undefined && row[exactKey] !== null && String(row[exactKey]).trim() !== '') {
          return row[exactKey];
        }
      }

      return fallback;
    }

    function parseExcelFile(file) {
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
          const entitiesSheet = wb.Sheets['Entities'];
          const relationshipsSheet = wb.Sheets['Relationships'];

          if (!entitiesSheet || !relationshipsSheet) {
            alert('The workbook must contain both an Entities sheet and a Relationships sheet.');
            return;
          }

          const ents = XLSX.utils.sheet_to_json(entitiesSheet, { defval: '', range: 1 });
          const rels = XLSX.utils.sheet_to_json(relationshipsSheet, { defval: '', range: 1 });
          const engagementMap = {};
          const activityToEngagementMap = {};
          const engagementIds = new Set();
          const activityIds = new Set();

          ents.forEach(row => {
            const rowType = String(getField(row, ['Type'])).trim().toLowerCase();
            const rowId = getField(row, ['ID', 'Id']);
            const rowName = getField(row, ['Name', 'Activity Name', 'Title']);

            if (rowType === 'engagement' && rowId) {
              engagementMap[rowId] = rowName || 'Unknown';
              engagementIds.add(String(rowId).trim());
            }
            if (rowType === 'activity' && rowId) {
              activityIds.add(String(rowId).trim());
            }
          });

          const relationshipIdFields = [
            'ID', 'Id',
            'Related to ID', 'Related To ID', 'RelatedToID', 'Related ID',
            'From ID', 'From Id', 'To ID', 'To Id',
            'Parent ID', 'Parent Id', 'Child ID', 'Child Id',
            'Source ID', 'Source Id', 'Target ID', 'Target Id',
            'Entity ID', 'Entity Id'
          ];

          rels.forEach(row => {
            const rowType = String(getField(row, ['Type'])).trim().toLowerCase();
            if (!(rowType.includes('engagement') && rowType.includes('activity'))) return;

            const candidates = [];
            relationshipIdFields.forEach(field => {
              const value = row[field];
              if (value !== undefined && value !== null && String(value).trim()) {
                candidates.push(String(value).trim());
              }
            });

            const uniqueCandidates = Array.from(new Set(candidates));
            const matchedEngagementId = uniqueCandidates.find(id => engagementIds.has(id));
            const matchedActivityIds = uniqueCandidates.filter(id => activityIds.has(id));

            if (matchedEngagementId && matchedActivityIds.length) {
              matchedActivityIds.forEach(activityId => {
                activityToEngagementMap[activityId] = matchedEngagementId;
              });
            }
          });

          allEvents = ents
            .filter(row => {
              const rowType = String(getField(row, ['Type'])).trim().toLowerCase();
              const activityDate = getField(row, ['Activity Date', 'Date', 'Start Date']);
              return rowType === 'activity' && activityDate;
            })
            .map(row => {
              const rawDate = getField(row, ['Activity Date', 'Date', 'Start Date']);
              let parsedDate = null;

              if (typeof rawDate === 'number') {
                const d = XLSX.SSF.parse_date_code(rawDate);
                if (d) {
                  parsedDate = `${d.y}-${String(d.m).padStart(2, '0')}-${String(d.d).padStart(2, '0')}`;
                }
              } else if (typeof rawDate === 'string' && rawDate.trim()) {
                const tmp = new Date(rawDate);
                if (!Number.isNaN(tmp.getTime())) {
                  parsedDate = `${tmp.getFullYear()}-${String(tmp.getMonth() + 1).padStart(2, '0')}-${String(tmp.getDate()).padStart(2, '0')}`;
                }
              }

              if (!parsedDate) return null;

              const rowId = getField(row, ['ID', 'Id']);
              const engagementName = engagementMap[activityToEngagementMap[String(rowId).trim()]] || 'Unknown';
              const salesEngineer = getField(row, ['Sales Engineer', 'SalesEngineer', 'Owner', 'Assigned To'], 'Unassigned');
              const activityType = getField(row, ['Activity Type', 'ActivityType', 'Type of Activity', 'Activity'], 'Unknown');
              const title = getField(row, ['Name', 'Activity Name', 'Title'], 'Untitled activity');

              return {
                title,
                start: parsedDate,
                extendedProps: {
                  sales_engineer: salesEngineer,
                  activity_type: activityType,
                  engagement: engagementName,
                  activity_date: parsedDate
                }
              };
            })
            .filter(Boolean);

          populateDropdown('salesEngineerFilter', extractUnique(allEvents, 'sales_engineer'), 'resetSalesFilterButton');
          populateDropdown('activityTypeFilter', extractUnique(allEvents, 'activity_type'), 'resetActivityFilterButton');
          populateDropdown('engagementFilter', extractUnique(allEvents, 'engagement'), 'resetEngagementFilterButton');

          setSelections('salesEngineerFilter');
          setSelections('activityTypeFilter');
          setSelections('engagementFilter');

          setDataLoadedState(true);
          changeView('week');
          applyFilters();
        } catch (err) {
          console.error(err);
          alert('There was a problem reading this Excel file.');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    document.getElementById('excelFile').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      parseExcelFile(file);
    });

    document.getElementById('prevBtn').addEventListener('click', () => calendar && calendar.prev());
    document.getElementById('nextBtn').addEventListener('click', () => calendar && calendar.next());
    document.getElementById('todayBtn').addEventListener('click', () => calendar && calendar.today());
    document.getElementById('toggleFiltersBtn').addEventListener('click', () => toggleFilters());
    document.getElementById('clearAllFiltersBtn').addEventListener('click', clearAllFilters);
    const resetDataBtn = document.getElementById('resetDataBtn');
    if (resetDataBtn) resetDataBtn.addEventListener('click', resetAllData);

    initializeTheme();

    const themeMenuButton = document.getElementById('themeMenuButton');
    const themeMenuPopover = document.getElementById('themeMenuPopover');
    const themeBrandBtn = document.getElementById('themeBrandBtn');
    const themeClassicBtn = document.getElementById('themeClassicBtn');
    const themeSpringfieldBtn = document.getElementById('themeSpringfieldBtn');
    const themeNoirBtn = document.getElementById('themeNoirBtn');
    const themeGlassBtn = document.getElementById('themeGlassBtn');

    function closeThemeMenu() {
      if (!themeMenuPopover || !themeMenuButton) return;
      themeMenuPopover.hidden = true;
      themeMenuButton.setAttribute('aria-expanded', 'false');
    }

    function openThemeMenu() {
      if (!themeMenuPopover || !themeMenuButton) return;
      themeMenuPopover.hidden = false;
      themeMenuButton.setAttribute('aria-expanded', 'true');
    }

    if (themeMenuButton) {
      themeMenuButton.addEventListener('click', function (e) {
        e.stopPropagation();
        const isOpen = themeMenuButton.getAttribute('aria-expanded') === 'true';
        if (isOpen) closeThemeMenu();
        else openThemeMenu();
      });
    }

    [themeBrandBtn, themeClassicBtn, themeSpringfieldBtn, themeNoirBtn, themeGlassBtn].forEach(function (btn) {
      if (!btn) return;
      btn.addEventListener('mouseenter', function () {
        btn.classList.add('is-hovering');
      });
      btn.addEventListener('mouseleave', function () {
        btn.classList.remove('is-hovering');
      });
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        const chosenTheme = btn.getAttribute('data-theme-choice');
        if (chosenTheme) applyTheme(chosenTheme);
        closeThemeMenu();
      });
    });

    document.addEventListener('click', function (e) {
      const option = e.target.closest('.theme-option');
      if (option) {
        const chosenTheme = option.getAttribute('data-theme-choice');
        if (chosenTheme) {
          applyTheme(chosenTheme);
        }
        closeThemeMenu();
        return;
      }

      if (!themeMenuPopover || !themeMenuButton) return;
      if (!themeMenuPopover.contains(e.target) && !themeMenuButton.contains(e.target)) {
        closeThemeMenu();
      }
    });

    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => changeView(btn.dataset.view));
    });

    ['salesEngineerFilter', 'activityTypeFilter', 'engagementFilter'].forEach(id => {
      document.getElementById(id).addEventListener('change', applyFilters);
    });

    const closeDetailBtn = document.getElementById('closeDetailBtn');
    if (closeDetailBtn) {
      closeDetailBtn.addEventListener('click', closeDetailModal);
    }

    const closeDetailBtnFooter = document.getElementById('closeDetailBtnFooter');
    if (closeDetailBtnFooter) {
      closeDetailBtnFooter.addEventListener('click', closeDetailModal);
    }
    document.getElementById('detailModalBackdrop').addEventListener('click', e => {
      if (e.target.id === 'detailModalBackdrop') {
        closeDetailModal();
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeDetailModal();
        const themeMenuPopover = document.getElementById('themeMenuPopover');
        const themeMenuButton = document.getElementById('themeMenuButton');
        if (themeMenuPopover && themeMenuButton) {
          themeMenuPopover.hidden = true;
          themeMenuButton.setAttribute('aria-expanded', 'false');
        }
      }
    });

    window.addEventListener('resize', () => {
      enforceMobileDayView();
      if (calendar) {
        applyResponsiveViewOnLoad();
      }
    });

    updateViewButtons();
    updateFilterSummary();
  </script>

<script id="final-theme-menu-script">
(function () {
  const themeMenuButton = document.getElementById('themeMenuButton');
  const themeMenuPopover = document.getElementById('themeMenuPopover');
  const optionMap = {
    themeBrandBtn: 'brand',
    themeClassicBtn: 'classic',
    themeSpringfieldBtn: 'springfield'
  };

  if (!themeMenuButton || !themeMenuPopover) return;

  function openThemeMenuFinal() {
    themeMenuPopover.hidden = false;
    themeMenuButton.setAttribute('aria-expanded', 'true');
  }

  function closeThemeMenuFinal() {
    themeMenuPopover.hidden = true;
    themeMenuButton.setAttribute('aria-expanded', 'false');
  }

  themeMenuButton.onclick = function (e) {
    e.preventDefault();
    e.stopPropagation();
    const isOpen = themeMenuButton.getAttribute('aria-expanded') === 'true';

  };

<script id="theme-menu-rebuild-v10">
(function () {
  var wrap = document.querySelector('.theme-menu-wrap');
  var trigger = document.getElementById('themeMenuButton');
  if (!wrap || !trigger) return;

  var old = document.getElementById('themeMenuOverlayFixed');
  if (old) old.remove();

  var menu = document.createElement('div');
  menu.id = 'themeMenuOverlayFixed';
  menu.className = 'theme-menu-overlay-fixed';
  menu.innerHTML = '' +
    '<button type="button" data-theme="brand">Brand</button>' +
    '<button type="button" data-theme="classic">Original</button>' +
    '<button type="button" data-theme="springfield">Springfield</button>' +
    '<button type="button" data-theme="noir">Film Noir</button>' +
    '<button type="button" data-theme="glass">Glass</button>';
  wrap.appendChild(menu);

  function syncButtons(theme) {
    Array.prototype.forEach.call(menu.querySelectorAll('button'), function (btn) {
      btn.classList.toggle('active', btn.getAttribute('data-theme') === theme);
    });
  }

  function currentTheme() {
    return document.body.getAttribute('data-theme') || 'brand';
  }

  function openMenu() {
    syncButtons(currentTheme());
    menu.classList.add('open');
    trigger.setAttribute('aria-expanded', 'true');
  }

  function closeMenu() {
    menu.classList.remove('open');
    trigger.setAttribute('aria-expanded', 'false');
  }

  trigger.onclick = function (e) {
    e.preventDefault();
    e.stopPropagation();
    if (menu.classList.contains('open')) closeMenu();
    else openMenu();
  };

  menu.onclick = function (e) {
    e.preventDefault();
    e.stopPropagation();
    var btn = e.target.closest('button[data-theme]');
    if (!btn) return;
    var theme = btn.getAttribute('data-theme');
    if (typeof window.applyTheme === 'function') {
      window.applyTheme(theme);
    } else if (typeof applyTheme === 'function') {
      applyTheme(theme);
    } else {
      document.body.setAttribute('data-theme', theme);
      document.documentElement.setAttribute('data-theme', theme);
    }
    syncButtons(theme);
    closeMenu();
  };

  document.addEventListener('click', function (e) {
    if (!wrap.contains(e.target)) closeMenu();
  }, true);

  syncButtons(currentTheme());
})();
</script>


<script id="theme-portal-v11-script">
(function () {
  var trigger = document.getElementById('themeMenuButton');
  if (!trigger) return;

  var oldPortal = document.getElementById('themeMenuPortal');
  if (oldPortal) oldPortal.remove();

  var legacyOverlay = document.getElementById('themeMenuOverlayFixed');
  if (legacyOverlay) legacyOverlay.remove();

  var legacyPopover = document.getElementById('themeMenuPopover');
  if (legacyPopover) {
    legacyPopover.hidden = true;
    legacyPopover.style.display = 'none';
    legacyPopover.setAttribute('aria-hidden', 'true');
  }

  var portal = document.createElement('div');
  portal.id = 'themeMenuPortal';
  portal.setAttribute('role', 'menu');
  portal.setAttribute('aria-labelledby', 'themeMenuButton');
  portal.innerHTML = '' +
    '<button type="button" data-theme="brand">Brand</button>' +
    '<button type="button" data-theme="classic">Original</button>' +
    '<button type="button" data-theme="springfield">Springfield</button>' +
    '<button type="button" data-theme="noir">Film Noir</button>' +
    '<button type="button" data-theme="glass">Glass</button>';
  document.body.appendChild(portal);

  function getTheme() {
    return document.body.getAttribute('data-theme') || document.documentElement.getAttribute('data-theme') || 'brand';
  }

  function syncActive(theme) {
    Array.prototype.forEach.call(portal.querySelectorAll('button[data-theme]'), function (btn) {
      btn.classList.toggle('active', btn.getAttribute('data-theme') === theme);
    });
  }

  function positionPortal() {
    var rect = trigger.getBoundingClientRect();
    portal.style.top = (rect.bottom + 12) + 'px';
    portal.style.left = Math.max(12, rect.right - 220) + 'px';
  }

  function openPortal() {
    positionPortal();
    syncActive(getTheme());
    portal.classList.add('open');
    trigger.setAttribute('aria-expanded', 'true');
  }

  function closePortal() {
    portal.classList.remove('open');
    trigger.setAttribute('aria-expanded', 'false');
  }

  trigger.onclick = function (e) {
    e.preventDefault();
    e.stopPropagation();
    if (portal.classList.contains('open')) closePortal();
    else openPortal();
  };

  portal.addEventListener('click', function (e) {
    e.stopPropagation();
    var btn = e.target.closest('button[data-theme]');
    if (!btn) return;
    var theme = btn.getAttribute('data-theme');
    if (typeof window.applyTheme === 'function') {
      window.applyTheme(theme);
    } else if (typeof applyTheme === 'function') {
      applyTheme(theme);
    } else {
      document.body.setAttribute('data-theme', theme);
      document.documentElement.setAttribute('data-theme', theme);
    }
    syncActive(theme);
    closePortal();
  });

  portal.addEventListener('pointerdown', function (e) {
    e.stopPropagation();
  });

  document.addEventListener('click', function (e) {
    if (!portal.contains(e.target) && !trigger.contains(e.target)) closePortal();
  }, true);

  window.addEventListener('resize', function () {
    if (portal.classList.contains('open')) positionPortal();
  });
  window.addEventListener('scroll', function () {
    if (portal.classList.contains('open')) positionPortal();
  }, true);

  syncActive(getTheme());
})();
</script>

</body>
</html>
